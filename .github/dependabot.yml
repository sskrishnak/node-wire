version: 2
updates:
  # Python dependencies — root project plus each publishable package.
  - package-ecosystem: "pip"
    directories:
      - "/"
      - "/packages/runtime"
      - "/packages/connectors/*"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    ignore:
      # Internal monorepo dependency; connector packages are versioned together
      # during releases, not independently by Dependabot.
      - dependency-name: "node-wire-runtime"
    groups:
      python-dependencies:
        patterns: ["*"]

  # GitHub Actions used by the workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      github-actions:
        patterns: ["*"]
