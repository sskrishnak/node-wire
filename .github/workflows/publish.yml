# Pinned action SHAs are immutable; update intentionally when upgrading.
# yamllint disable rule:line-length
name: Publish Node Wire package

# Manual trigger after a GitHub Release exists for the tag.
# package_path must match the allowlist below (prevents confused-deputy path abuse).
#
# Examples:
#   tag: v1.0.0
#   package_path: packages/runtime
#   package_path: packages/connectors/fhir_epic
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish from (e.g. v1.0.0)"
        required: true
        type: string
      package_path:
        description: |
          Relative path to the package directory (must be allowlisted).
          Examples: packages/runtime | packages/connectors/fhir_epic
        required: true
        type: string

env:
  PIP_AUDIT_VERSION: "2.7.3"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Verify prerequisites before building wheels.
  # ─────────────────────────────────────────────────────────────────────────────
  prerequisites:
    name: Verify prerequisites
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      release_version: ${{ steps.resolve.outputs.release_version }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      package_path: ${{ steps.validate.outputs.package_path }}
      artifact_slug: ${{ steps.validate.outputs.artifact_slug }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: refs/tags/${{ inputs.tag }}
          fetch-depth: 0

      - name: Resolve release version from tag
        id: resolve
        shell: python
        run: |
          import os
          import re
          import sys

          tag = "${{ inputs.tag }}".strip()
          version = tag[1:] if tag.startswith("v") else tag

          if not re.fullmatch(r"\d+\.\d+\.\d+", version):
              print(f"ERROR: {version!r} is not a MAJOR.MINOR.PATCH version", file=sys.stderr)
              sys.exit(1)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"release_version={version}\n")
              out.write(f"release_tag={tag}\n")

          print(f"Publishing from tag {tag} (version {version})")

      - name: Validate package path (allowlist)
        id: validate
        shell: python
        run: |
          import os
          import sys

          raw = "${{ inputs.package_path }}".strip().replace("\\", "/")
          norm = os.path.normpath(raw).replace("\\", "/")
          if norm.startswith("..") or os.path.isabs(raw):
              print("ERROR: invalid package_path", file=sys.stderr)
              sys.exit(1)
          allowed = {
              "packages/runtime",
              "packages/connectors/http_generic",
              "packages/connectors/stripe",
              "packages/connectors/smtp",
              "packages/connectors/google_drive",
              "packages/connectors/fhir_cerner",
              "packages/connectors/fhir_epic",
              "packages/connectors/salesforce",
              "packages/connectors/slack",
          }
          if norm not in allowed:
              print(f"ERROR: package_path {norm!r} is not allowlisted.", file=sys.stderr)
              print("Allowed:", sorted(allowed), file=sys.stderr)
              sys.exit(1)

          artifact_slug = norm.replace("/", "-")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"package_path={norm}\n")
              out.write(f"artifact_slug={artifact_slug}\n")

          print(f"PASS: package_path {norm!r} is allowlisted")

      - name: Verify package version and changelog
        shell: python
        run: |
          import pathlib
          import re
          import sys
          import tomllib

          version = "${{ steps.resolve.outputs.release_version }}"
          package_path = pathlib.Path("${{ steps.validate.outputs.package_path }}")

          data = tomllib.loads((package_path / "pyproject.toml").read_text(encoding="utf-8"))
          actual = data.get("project", {}).get("version")
          if actual != version:
              print(
                  f"ERROR: {package_path}/pyproject.toml version {actual!r} "
                  f"does not match tag version {version!r}",
                  file=sys.stderr,
              )
              sys.exit(1)

          changelog = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8")
          heading = re.compile(
              rf"^## \[{re.escape(version)}\] - \d{{4}}-\d{{2}}-\d{{2}}\s*$",
              re.MULTILINE,
          )
          if not heading.search(changelog):
              print(f"ERROR: CHANGELOG.md is missing a dated [{version}] section", file=sys.stderr)
              sys.exit(1)

          link_pattern = rf"^\[{re.escape(version)}\]: .+/releases/tag/v{re.escape(version)}\s*$"
          if not re.search(link_pattern, changelog, re.MULTILINE):
              print(f"ERROR: CHANGELOG.md is missing the [{version}] release link", file=sys.stderr)
              sys.exit(1)

          print(f"PASS: package version and changelog match {version}")

      - name: Verify GitHub Release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ steps.resolve.outputs.release_tag }}" \
            --json tagName \
            --jq '.tagName'

  # ─────────────────────────────────────────────────────────────────────────────
  # Build a binary wheel for each platform (Linux / macOS / Windows).
  # cibuildwheel compiles Cython extensions and produces manylinux / macosx /
  # win_amd64 wheels. The NoPyBuild override in setup.py ensures .py source
  # files are excluded from all wheels.
  # ─────────────────────────────────────────────────────────────────────────────
  build-wheels:
    name: Build (${{ matrix.os }})
    needs: prerequisites
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: refs/tags/${{ needs.prerequisites.outputs.release_tag }}

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.11"

      - name: Install build tools
        run: python -m pip install --upgrade pip "cython>=3.0" "cibuildwheel>=2.16.0"

      - name: Build platform wheel(s)
        run: |
          cd "${{ needs.prerequisites.outputs.package_path }}"
          python -m cibuildwheel --output-dir dist
        env:
          CIBW_BUILD: "cp311-* cp312-*"
          CIBW_SKIP: "*-win32 *-manylinux_i686 pp*"

      - name: Verify binary-only wheel (no .py source)
        shell: python
        run: |
          import glob, sys, zipfile

          package_path = "${{ needs.prerequisites.outputs.package_path }}"
          wheels = glob.glob(f"{package_path}/dist/*.whl")
          if not wheels:
              print("ERROR: No wheels produced", file=sys.stderr)
              sys.exit(1)

          leaked: dict[str, list[str]] = {}
          for whl in wheels:
              with zipfile.ZipFile(whl) as zf:
                  bad = [n for n in zf.namelist() if n.endswith(".py")]
              if bad:
                  leaked[whl] = bad

          if leaked:
              print("SECURITY FAIL: .py files found in wheel(s):", file=sys.stderr)
              for whl, files in leaked.items():
                  print(f"  {whl}:", file=sys.stderr)
                  for f in files:
                      print(f"    {f}", file=sys.stderr)
              sys.exit(1)

          print(f"PASS: {len(wheels)} wheel(s) verified — no .py source files")

      - name: Record wheel SHA256 (artifact integrity)
        shell: python
        run: |
          import hashlib, pathlib, sys

          dist = pathlib.Path("${{ needs.prerequisites.outputs.package_path }}") / "dist"
          wheels = sorted(dist.glob("*.whl"))
          if not wheels:
              print("ERROR: no wheels to hash", file=sys.stderr)
              sys.exit(1)
          lines = []
          for w in wheels:
              h = hashlib.sha256(w.read_bytes()).hexdigest()
              line = f"{h}  {w.name}"
              print(line)
              lines.append(line)
          (dist / "sha256sums.txt").write_text("\n".join(lines) + "\n", encoding="utf-8")

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: wheels-${{ matrix.os }}-${{ needs.prerequisites.outputs.release_tag }}-${{ needs.prerequisites.outputs.artifact_slug }}
          path: ${{ needs.prerequisites.outputs.package_path }}/dist/*
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────────
  # Collect all platform wheels, run supply-chain checks, publish to PyPI.
  # Uses Trusted Publisher (OIDC) — no long-lived PyPI API tokens needed.
  # Configure on PyPI: Settings → Publishing → Add Publisher (GitHub, this repo,
  # workflow name = "Publish Node Wire package").
  # ─────────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish to PyPI
    needs: [prerequisites, build-wheels]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: refs/tags/${{ needs.prerequisites.outputs.release_tag }}

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.11"

      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*-${{ needs.prerequisites.outputs.release_tag }}-${{ needs.prerequisites.outputs.artifact_slug }}
          path: dist-all
          merge-multiple: true

      - name: Flatten into dist/ directory
        run: |
          mkdir -p dist
          find dist-all -name "*.whl" -exec cp {} dist/ \;
          echo "Wheels collected:"
          ls dist/
          sha256sum dist/*.whl | tee dist/sha256sums.txt

      - name: Upload wheel checksums
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: wheel-checksums-${{ needs.prerequisites.outputs.release_tag }}-${{ needs.prerequisites.outputs.artifact_slug }}
          path: dist/sha256sums.txt
          if-no-files-found: error

      - name: Validate wheel version matches tag
        shell: python
        run: |
          import glob, sys

          expected = "${{ needs.prerequisites.outputs.release_version }}"
          wheels = glob.glob("dist/*.whl")
          if not wheels:
              print("ERROR: No wheels found for publish", file=sys.stderr)
              sys.exit(1)

          bad = [
              w for w in wheels
              if f"-{expected}-" not in w and f"-{expected.replace('.', '_')}-" not in w
          ]
          if bad:
              print(f"ERROR: Version mismatch. Expected {expected!r} in filename.", file=sys.stderr)
              for w in bad:
                  print(f"  {w}", file=sys.stderr)
              sys.exit(1)

          print(f"PASS: {len(wheels)} wheel(s) match version {expected!r}")

      - name: Install built wheels for CVE scan
        run: pip install dist/*.whl

      - name: Vulnerability scan (CVE gate — blocks publish on HIGH or higher)
        run: |
          pip install "pip-audit==${{ env.PIP_AUDIT_VERSION }}"
          pip-audit --fail-on HIGH

      - name: Publish to PyPI (Trusted Publisher / OIDC + Sigstore attestations)
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc # v1.12.4
        with:
          packages-dir: dist/
          attestations: true
