name: Secret scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Weekly — catches newly disclosed patterns against full history.
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Cache Gitleaks binary
        id: cache-gitleaks
        uses: actions/cache@v4
        with:
          path: ./gitleaks
          key: gitleaks-v8.27.2-linux-x64

      - name: Download Gitleaks
        if: steps.cache-gitleaks.outputs.cache-hit != 'true'
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.27.2/gitleaks_8.27.2_linux_x64.tar.gz \
            | tar -xz gitleaks
          chmod +x gitleaks

      - name: Run Gitleaks
        run: |
          if [[ ! -x ./gitleaks ]]; then
            echo "::error::Gitleaks binary missing or not executable — cache may be corrupt"
            exit 1
          fi
          ./gitleaks detect --source . --redact --exit-code 1
