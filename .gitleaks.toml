title = "Node Wire gitleaks configuration"

[allowlist]
description = "Known false positives: placeholder values, test fixtures, and documentation stubs"

# regexTarget = "secret" matches against the extracted secret value only,
# not surrounding context — keeps these allowlist rules as narrow as possible.
regexTarget = "secret"

regexes = [
  # sample.env instructional placeholder — not a real credential.
  '''replace-with-hs256-secret''',

  # Stripe's canonical documentation test token. This specific value is
  # published in Stripe's own public docs and is not a live key.
  '''sk_test_4eC39HqLyjWDarjtT1zdp7dc''',

  # RSA/EC key stubs used in documentation examples whose body is the literal
  # string "..." — structurally valid PEM headers with no real key material.
  # Real keys never contain "..." as body content.
  '''\.\.\.''',
]

# tests/test_payload_redaction.py contains dummy PEM key material (body marked
# "...dummy...") that is required to exercise the payload-redaction logic.
# The file exists solely to test that fake-looking keys are redacted correctly.
paths = [
  '''tests/test_payload_redaction\.py''',
]

# Historical commits where documentation used RSA key stubs or Stripe's test
# token. These values were removed from the working tree in later commits.
commits = [
  "1d14bc1236beb7da3687e2eae648f07f947c36b8",  # Initial Commit          — Setup.md RSA stub
  "65ecd72a4d635359a1242f5b4c3d3c4d09916caa",  # Feature/merge prs       — Setup.md RSA stub
  "ab75ce91057be702e33fa4a25d5a8d189393e87b",  # Stripe connector         — docs Stripe test token + RSA stub
  "ccd272e5793c1625302c9bf19e1f489e9af8bdfd",  # Added Multiple MCPs      — docs RSA stub
  "0e26561e7e956dd333252860881cf41c804a2dc8",  # Feature/python packages  — connectorplatform key (revoked)
  "92f85f2c22fe1d0659828781e3afb4eb242c4048",  # Added connector package  — connectorplatform key (revoked)
]
